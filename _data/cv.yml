    Projects:
      - name: Heterogeneous rover-drone platform
        start_date: 2025-08
        end_date: present
        summary: Designing and developing a rover and drone platform integrated with Raspberry Pi for scalable aerial and ground CPS operations.
        highlights:
          - Integrates rover and drone systems in a common CPS framework
          - Supports scalable and affordable field operations

      - name: Rover for farm applications
        start_date: 2024-08
        end_date: 2025-12
        summary: Developed a farming rover by repurposing a ride-on toy car and integrating Raspberry Pi for control and sensing.
        highlights:
          - Built data pipeline for image and sensor preprocessing
          - Enabled citrus plant detection and analysis
          - Designed removable hardware support structure

      - name: Cost-Effective Cyber-Physical System Prototype for Precision Agriculture with a Focus on Crop
        start_date: 2023-08
        end_date: 2024-08
        summary: Designed and implemented a CPS prototype for crop monitoring and growth prediction in hydroponic environments.
        highlights:
          - Integrated ESP32, Raspberry Pi, sensors, and digital image processing
          - Compared TF-Luna and ultrasonic sensors for non-destructive measurements
          - Built linear and Bayesian regression models with over 90 percent test accuracy

      - name: Trash Sorter Using Object Detection
        start_date: 2023-01
        end_date: 2023-05
        summary: Developed an object-detection-based trash sorting system integrated with the Franka Emika Robot.
        highlights:
          - Researched object detection approaches
          - Integrated perception with robotic sorting
          - Documented design and performance results

      - name: Analysis of Poisoning Attacks in Federated Learning for Educational Data Mining
        start_date: 2022-08
        end_date: 2022-12
        summary: Studied poisoning attacks in federated learning models for student dropout prediction.
        highlights:
          - Used KDDCUP2015 data
          - Evaluated mitigation strategies and model robustness

      - name: Automatic Early Detection of SARS-COVID-19 Using Deep Learning Techniques
        start_date: 2021-08
        end_date: 2022-05
        summary: Led a team project on deep learning models for COVID-19 severity classification using X-rays and CT scans.
        highlights:
          - Compared VGG-19, ResNet-50, InceptionV3, and Xception
          - Evaluated accuracy, precision, recall, and F1 score

